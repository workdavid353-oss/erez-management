name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env.production
        shell: powershell
        run: Copy-Item "C:\actions-runner\.env.production" -Destination .env.production -Force

      - name: Install dependencies
        shell: powershell
        run: npm ci

      - name: Build
        shell: powershell
        run: npm run build

      - name: Build Docker image
        shell: powershell
        run: |
          $context = (Get-Location).Path
          Write-Host "Build context: $context"
          Get-ChildItem "$context\dist\assets" | Select-Object Name
          docker build --pull=false --no-cache -t erez-frontend $context

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop erez-frontend
          docker rm erez-frontend

      - name: Start new container
        shell: powershell
        run: docker run -d -p 80:80 --name erez-frontend --restart unless-stopped erez-frontend
