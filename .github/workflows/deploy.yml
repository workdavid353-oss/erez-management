name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env.production
        shell: powershell
        run: Copy-Item "C:\Users\davidferber\Desktop\VS-Code\erez-management\.env.production" -Destination .env.production -Force

      - name: Install dependencies
        shell: powershell
        run: npm ci

      - name: Build
        shell: powershell
        run: npm run build

      - name: Build Docker image
        shell: powershell
        run: docker build --pull=false -t erez-frontend .

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop erez-frontend
          docker rm erez-frontend

      - name: Start new container
        shell: powershell
        run: docker run -d -p 80:80 --name erez-frontend --restart unless-stopped erez-frontend
